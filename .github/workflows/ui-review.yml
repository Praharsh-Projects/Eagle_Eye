name: eagle-eye-ui-review

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ui-review.yml'
      - 'app/**'
      - 'src/**'
      - 'review/**'
      - 'run_ui_review.sh'
      - 'requirements.txt'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: eagle-eye-ui-review-pages
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt playwright

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Start Streamlit
        run: |
          mkdir -p review/latest review/runs review/logs
          PYTHONPATH=. nohup streamlit run app/streamlit_app.py \
            --server.address 127.0.0.1 \
            --server.port 8501 \
            --server.headless true \
            > review/logs/streamlit-ci.log 2>&1 &
          echo $! > review/logs/streamlit.pid

      - name: Wait for Streamlit
        run: |
          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8501 >/dev/null; then
              echo "Streamlit ready"; exit 0
            fi
            sleep 1
          done
          echo "Streamlit failed to start"
          tail -n 200 review/logs/streamlit-ci.log || true
          exit 1

      - name: Start API
        run: |
          PYTHONPATH=. nohup python -m uvicorn src.api.server:app --host 127.0.0.1 --port 8000 \
            > review/logs/api-ci.log 2>&1 &
          echo $! > review/logs/api.pid

      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "API ready"; exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          tail -n 200 review/logs/api-ci.log || true
          exit 1

      - name: Run UI audit
        continue-on-error: true
        run: |
          set +e
          python -m src.review.ui_audit \
            --base-url http://127.0.0.1:8501 \
            --api-base-url http://127.0.0.1:8000 \
            --scenarios review/scenarios.json \
            --output-dir review/latest \
            --timeout-ms 45000 \
            --max-attempts 2
          REVIEW_EXIT=$?
          echo "REVIEW_EXIT=$REVIEW_EXIT" >> "$GITHUB_ENV"
          exit 0

      - name: Build review pages structure
        if: always()
        run: |
          RUN_ID=$(python -c "import json, pathlib; p=pathlib.Path('review/latest/review_index.json'); print(json.loads(p.read_text(encoding='utf-8')).get('run_id','unknown') if p.exists() else 'missing')")
          if [ "$RUN_ID" = "missing" ]; then
            RUN_ID=$(date -u +%Y%m%dT%H%M%SZ)
            mkdir -p review/latest
            printf '%s\n' '# Eagle Eye UI Review Summary' '' 'No `review_index.json` was generated by the audit run.' 'Check workflow logs and `review/logs/*`.' > review/latest/review_summary.md
            printf '%s\n' "{\"schema_version\":\"1.0\",\"run_id\":\"$RUN_ID\",\"overall_status\":\"fail\",\"totals\":{\"scenarios\":0,\"failed\":1}}" > review/latest/review_index.json
          fi

          mkdir -p "review/runs/$RUN_ID"
          cp -R review/latest/* "review/runs/$RUN_ID"/

          mkdir -p site/review/latest "site/review/runs/$RUN_ID"
          cp -R review/latest/* site/review/latest/
          cp -R "review/runs/$RUN_ID"/* "site/review/runs/$RUN_ID"/

          printf '%s\n' \
            '<!doctype html>' \
            '<html lang="en">' \
            '<head><meta charset="utf-8"><title>Eagle Eye Review Artifacts</title></head>' \
            '<body style="font-family: Arial, sans-serif; margin: 2rem;">' \
            '  <h1>Eagle Eye UI Review Artifacts</h1>' \
            "  <p><strong>Latest run:</strong> $RUN_ID</p>" \
            '  <ul>' \
            '    <li><a href="./latest/review_summary.md">Latest summary (Markdown)</a></li>' \
            '    <li><a href="./latest/review_index.json">Latest machine-readable JSON</a></li>' \
            "    <li><a href=\"./runs/$RUN_ID/review_summary.md\">This run summary</a></li>" \
            "    <li><a href=\"./runs/$RUN_ID/review_index.json\">This run JSON</a></li>" \
            '  </ul>' \
            '</body>' \
            '</html>' \
            > site/review/index.html

      - name: Upload workflow artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eagle-eye-ui-review-artifacts
          path: |
            review/latest/**
            review/runs/**
            review/logs/**
            site/**

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Stop background services
        if: always()
        run: |
          if [ -f review/logs/streamlit.pid ]; then kill "$(cat review/logs/streamlit.pid)" || true; fi
          if [ -f review/logs/api.pid ]; then kill "$(cat review/logs/api.pid)" || true; fi

      - name: Fail if audit failed
        if: always()
        run: |
          if [ "${REVIEW_EXIT:-1}" -ne 0 ]; then
            echo "UI audit reported failures. See review/latest/review_summary.md"
            exit 1
          fi

  deploy-pages:
    needs: review
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
