syntax = "proto3";

package flowforge;

service FlowForge {
  rpc SubmitJob (SubmitJobRequest) returns (JobResponse);
  rpc GetJobStatus (GetJobStatusRequest) returns (JobStatusResponse);
  rpc StreamJobUpdates (GetJobStatusRequest) returns (stream JobStatusResponse);
}

message SubmitJobRequest {
  string payload_json = 1;
  int32 priority = 2;
  string webhook_url = 3;
}

message JobResponse {
  string job_id = 1;
  string status = 2;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string job_id = 1;
  string status = 2;
  int32 attempts = 3;
  string error_message = 4;
  string result_json = 5;
  int64 updated_epoch_seconds = 6;
}
