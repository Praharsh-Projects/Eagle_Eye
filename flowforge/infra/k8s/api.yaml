apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-api
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-api
  template:
    metadata:
      labels:
        app: flowforge-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/flowforge-api:latest
          envFrom:
            - configMapRef:
                name: flowforge-config
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-api
  namespace: flowforge
spec:
  selector:
    app: flowforge-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
